name: Bug report
description: Report something that is broken or behaves unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report.

  - type: input
    id: extension-version
    attributes:
      label: Extension version
      description: e.g. 0.1.0 (visible in the Extensions panel)
    validations:
      required: true

  - type: input
    id: vscode-version
    attributes:
      label: VS Code version
      description: From Help → About
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Windows 11, macOS 14, Ubuntu 24.04
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: A short `.uxml` or `.uss` snippet that reproduces the issue.
      render: xml
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What happened instead?
    validations:
      required: true
