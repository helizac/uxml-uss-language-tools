name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      # The integration tests boot a real VS Code, which needs a display on Linux.
      # xvfb-run gives us a virtual one; the other two runners already have a display.
      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test

      - name: Test (non-Linux)
        if: runner.os != 'Linux'
        run: npm test
