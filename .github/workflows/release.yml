name: Release

# Three ways to trigger a release:
#
# 1. Push a tag like v0.2.0  -> always releases that version.
# 2. Push to main where package.json version was bumped -> auto-tags + releases.
# 3. Manual "Run workflow" from the Actions tab.
#
# Required repository secrets:
#   VSCE_PAT  -> Azure DevOps PAT (Marketplace > Manage scope) for VS Code Marketplace
#   OVSX_PAT  -> Open VSX token (optional, for VSCodium and forks)

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  detect-version:
    # Decide whether this run should publish, and what tag to use.
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need previous commit to diff package.json

      - id: check
        shell: bash
        run: |
          set -eu
          version=$(node -p "require('./package.json').version")
          tag="v$version"
          echo "version=$version"   >> "$GITHUB_OUTPUT"
          echo "tag=$tag"           >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            # Tag push -> always release.
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Release reason: tag push ($tag)"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Release reason: manual dispatch ($tag)"
          else
            # Push to main -> release iff package.json version actually changed.
            prev=$(git show HEAD~1:package.json 2>/dev/null | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{console.log(JSON.parse(d).version)}catch{console.log('')}})") || prev=""
            if [[ -n "$prev" && "$prev" != "$version" ]]; then
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "Release reason: version bumped from $prev to $version"
            else
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "No version bump detected (package.json version is still $version). Skipping release."
            fi
          fi

  release:
    needs: detect-version
    if: needs.detect-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the GitHub Release and push the tag
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run compile
      - name: Run tests
        run: xvfb-run -a npm test

      - name: Package extension
        run: npx --yes @vscode/vsce package --out extension.vsix

      - name: Ensure git tag exists
        # If we got here from a main-branch version bump (no tag pushed by user),
        # create and push the tag before creating the GitHub Release.
        env:
          TAG: ${{ needs.detect-version.outputs.tag }}
        run: |
          set -eu
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect-version.outputs.tag }}
          files: extension.vsix
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --packagePath extension.vsix

      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --yes ovsx publish extension.vsix --pat "$OVSX_PAT"
