name: Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: check
        shell: bash
        run: |
          set -eu
          version=$(node -p "require('./package.json').version")
          tag="v$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag"         >> "$GITHUB_OUTPUT"

          event="${{ github.event_name }}"
          ref="${{ github.ref }}"

          if [[ "$event" == "push" && "$ref" == refs/tags/* ]]; then
            # Tag push -> always release.
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Reason: tag push ($tag)"
          elif [[ "$event" == "workflow_dispatch" ]]; then
            # Manual run -> always release.
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Reason: manual dispatch ($tag)"
          else
            # Push to main. Skip if the tag already exists remotely; otherwise
            # release iff the version actually changed since the previous commit.
            if git ls-remote --tags --exit-code origin "refs/tags/$tag" >/dev/null 2>&1; then
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "Reason: tag $tag already exists remotely (the tag-push run will handle the release)"
            else
              prev_json=$(git show HEAD~1:package.json 2>/dev/null || echo '{}')
              prev=$(node -e "try { console.log(JSON.parse(process.argv[1]).version || '') } catch { console.log('') }" -- "$prev_json")
              if [[ -n "$prev" && "$prev" != "$version" ]]; then
                echo "should_release=true" >> "$GITHUB_OUTPUT"
                echo "Reason: version bumped from $prev to $version on main"
              else
                echo "should_release=false" >> "$GITHUB_OUTPUT"
                echo "Reason: no version bump detected (still $version)"
              fi
            fi
          fi

  release:
    needs: detect-version
    if: needs.detect-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run compile
      - name: Run tests
        run: xvfb-run -a npm test

      - name: Package extension
        run: npx --yes @vscode/vsce package --out extension.vsix

      - name: Ensure git tag exists
        env:
          TAG: ${{ needs.detect-version.outputs.tag }}
        run: |
          set -eu
          if git ls-remote --tags --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists remotely. Nothing to do."
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect-version.outputs.tag }}
          files: extension.vsix
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --packagePath extension.vsix

      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --yes ovsx publish extension.vsix --pat "$OVSX_PAT"